name: Deploy Vector Playground

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  workflow_dispatch:

jobs:
  build-api:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish API
        run: dotnet publish api/api.csproj -c Release -o api/publish

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: api/publish
          include-hidden-files: true

  build-app:
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build
        working-directory: app
        run: npm run build

      - name: Copy SWA config
        working-directory: app
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Upload app artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-dist
          path: app/dist

  deploy-api-staging:
    needs: build-api
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: api-publish

      - name: Deploy to staging slot
        uses: Azure/functions-action@v1
        with:
          app-name: func-vectorplayground-prod
          slot-name: staging
          package: api-publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_STAGING_PUBLISH_PROFILE }}

  deploy-swa-staging:
    needs: [build-app, deploy-api-staging]
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Build with staging API URL
        working-directory: app
        run: npm run build
        env:
          VITE_API_BASE_URL: https://func-vectorplayground-prod-staging.azurewebsites.net/api

      - name: Copy SWA config
        working-directory: app
        run: cp staticwebapp.config.json dist/staticwebapp.config.json

      - name: Deploy to SWA staging
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: app/dist
          skip_app_build: true
          skip_api_build: true

  deploy-api:
    needs: build-api
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: api-publish

      - name: Deploy to Azure Functions
        uses: Azure/functions-action@v1
        with:
          app-name: func-vectorplayground-prod
          package: api-publish
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

  deploy-swa:
    needs: build-app
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Download app artifact
        uses: actions/download-artifact@v4
        with:
          name: app-dist
          path: app-dist

      - name: Deploy to SWA
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: upload
          app_location: app-dist
          skip_app_build: true
          skip_api_build: true

  close-staging:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Close staging environment
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_DEPLOYMENT_TOKEN }}
          action: close
